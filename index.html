<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Chaos</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>

<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="top-navbar">
      <div class="nav-shell">
        <div class="brand">Button Crash</div>
        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">FPS</div>
            <div class="stat-value accent" id="debug-fps">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Buttons</div>
            <div class="stat-value" id="hud-count">1</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Clicks</div>
            <div class="stat-value" id="hud-clicks">0</div>
          </div>
        </div>
      </div>
    </div>

    <div id="modifier-flash"></div>

    <div id="debug-panel">
      <div>Entities: <span id="debug-entities">0</span></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
